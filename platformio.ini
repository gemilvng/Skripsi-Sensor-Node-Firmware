; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Framework/HAL, toolchain and libraries:
[env:ttgo-t-beam]
platform = espressif32@7.0.0
board = ttgo-t-beam
framework = arduino
lib_deps=
    https://github.com/LoRaMesher/LoRaMesher.git#v1.0.0
    lewisxhe/XPowersLib@^0.3.3

; Configuration parameter:
monitor_speed = 115200
monitor_filters = time, log2file

; Build flags:
build_flags =
    -Wall
    -DCORE_DEBUG_LEVEL=4
    ; Make include/ visible to the LoRaMesher library too, so the patched
    ; network_service.cpp can #include "mesh_isolation.h".
    -I include
    ; Logical-isolation backup for forcing multi-hop (off by default — normal
    ; builds compile as if it does not exist). Uncomment ONLY for the isolation
    ; demo build. See dev-resource/logical-isolation-feature.md.
    ;-DMESH_FORCE_ISOLATION
